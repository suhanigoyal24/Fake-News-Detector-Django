{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FactCheck AI</title>

    <link rel="stylesheet" href="{% static 'detector/css/style.css' %}">

    <script>
        const CHECK_NEWS_URL = "{% url 'check_news' %}";
        const SUBMIT_REVIEW_URL = "{% url 'submit_review' %}";
    </script>

    <script defer src="{% static 'detector/js/main.js' %}"></script>
</head>

<body>

<header class="header">
    <h1><span class="logo">✔</span> FactCheck AI</h1>
</header>

<div class="layout">

    <!-- LEFT PANEL -->
    <div class="left">

        <div class="card">
            <h2>Verify a Claim</h2>

            <form id="newsForm">
                {% csrf_token %}
                <textarea name="news_text" placeholder="Paste news headline or claim..."></textarea>
                <button type="submit">Verify</button>
            </form>
        </div>

        <div class="card">
            <h3>History</h3>
            <div id="historyList"></div>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

        <div class="card result-card" id="resultCard" style="display:none;">

            <div id="resultBadge"></div>

            <div class="confidence-section">
                <span>Confidence</span>
                <div class="bar">
                    <div id="confidenceFill"></div>
                </div>
                <p id="confidenceText"></p>
            </div>

            <div class="meta">
                <p id="reason"></p>
                <p id="source"></p>
                <p id="url"></p>
            </div>

        </div>

        <div class="card">
            <h3>Did You Know?</h3>
            <p>{{ fact }}</p>
        </div>

        <div class="card">
            <h3>Leave a Review</h3>
            <form id="reviewForm">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Your Name">
                <textarea name="review" placeholder="Write your review..."></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
